<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega</title>

<!-- NOVA FONTE -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #00ff88;
    --primary-dark: #00cc6a;
    --bg: #0f0f0f;
    --card: #1a1a1a;
    --text: #ffffff;
}

body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* HERO */
.hero {
    background: linear-gradient(90deg, #000000, #1a1a1a);
    text-align: center;
    padding: 50px 20px;
    border-bottom: 3px solid var(--primary);
}

.hero h1 {
    margin: 0;
    font-size: 36px;
    font-weight: 900;
    letter-spacing: 2px;
    color: var(--primary);
}

.hero p {
    margin-top: 10px;
    font-size: 15px;
    opacity: 0.8;
}

/* CARD */
.card {
    max-width: 500px;
    margin: -30px auto 0 auto;
    background: var(--card);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(0,255,136,0.3);
    text-align: center;
    border: 1px solid rgba(0,255,136,0.3);
}

/* TIMER */
.timer {
    font-size: 40px;
    color: var(--primary);
    font-weight: 900;
    margin: 15px 0;
}

/* ALERT */
.alert {
    background: rgba(255,0,0,0.1);
    color: #ff4d4d;
    padding: 12px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
}

/* ONLINE */
.online {
    margin-top: 12px;
    font-size: 14px;
    color: var(--primary);
    font-weight: 600;
}

/* PROGRESS */
.progress-box {
    margin-top: 25px;
    height: 12px;
    background: #333;
    border-radius: 10px;
    overflow: hidden;
}

.progress {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00ff88, #00cc6a);
}

/* BENEFITS */
.benefits {
    margin-top: 25px;
    text-align: left;
    font-size: 15px;
}

.benefits div {
    margin-bottom: 10px;
}

/* BOTÃO FIXO */
.cta-fixed {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #000;
    padding: 18px;
    box-shadow: 0 -5px 30px rgba(0,255,136,0.2);
}

.cta-fixed a {
    display: block;
    text-align: center;
    padding: 20px;
    border-radius: 12px;
    background: linear-gradient(90deg, #00ff88, #00cc6a);
    color: #000;
    font-weight: 900;
    text-decoration: none;
    font-size: 19px;
    transition: 0.3s;
}

.cta-fixed a:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="hero">
    <h1>🔥 MEGA FEIRÃO</h1>
    <p>Descontos exclusivos liberados por tempo limitado</p>
</div>

<div class="card">

    <div class="timer" id="timer">03:00</div>

    <div class="alert">⚠️ Últimas vagas disponíveis</div>

    <div class="online" id="online">👥 127 pessoas vendo agora</div>

    <div class="progress-box">
        <div id="progress" class="progress"></div>
    </div>

    <div class="benefits">
        <div>✔ Desconto exclusivo</div>
        <div>✔ Acesso imediato</div>
        <div>✔ Oferta válida só hoje</div>
    </div>

</div>

<div class="cta-fixed">
    <a href="https://ornate-phoenix-380787.netlify.app/">
        🔥 GARANTIR DESCONTO AGORA
    </a>
</div>

<script>
// PROGRESSO
let percent = 0;
const progress = document.getElementById("progress");

setInterval(() => {
    percent++;
    progress.style.width = percent + "%";
    if (percent >= 100) percent = 0;
}, 40);

// TIMER
let time = 180;
const timer = document.getElementById("timer");

setInterval(() => {
    let min = Math.floor(time / 60);
    let sec = time % 60;

    timer.innerText =
        (min < 10 ? "0" : "") + min + ":" +
        (sec < 10 ? "0" : "") + sec;

    if (time > 0) time--;
}, 1000);

// ONLINE
const online = document.getElementById("online");

setInterval(() => {
    let num = Math.floor(Math.random() * 60) + 120;
    online.innerText = "👥 " + num + " pessoas vendo agora";
}, 3000);
</script>

</body>
</html>
